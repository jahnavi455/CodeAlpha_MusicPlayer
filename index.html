<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Player</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="music-player">

    <!-- Album Cover -->

    <img src="" class="cover" id="cover">

    <!-- Song Info -->

    <h2 id="title">Song Title</h2>

    <p id="artist">Artist Name</p>

    <!-- Duration -->

    <div class="time">

        <span id="current-time">0:00</span>

        <span id="duration">0:00</span>

    </div>

    <!-- Progress Bar -->

    <input type="range" id="progress" value="0">

    <!-- Controls -->

    <div class="controls">

        <button id="prev">⏮</button>

        <button id="play">▶</button>

        <button id="next">⏭</button>

    </div>

    <!-- Volume -->

    <div class="volume-wrapper">

    <button id="volume-btn">
        🔊
    </button>

    <div class="volume-container" id="volume-container">

        <input
            type="range"
            id="volume"
            min="0"
            max="1"
            step="0.1"
            value="1"
        >

    </div>

</div>

    <!-- Extra Buttons -->

    <div class="extra-buttons">

        <button id="playlist-btn">
            Playlist
        </button>

        <button id="autoplay-btn">
            Autoplay: ON
        </button>

    </div>

    <!-- Playlist Panel -->

    <div class="playlist-container" id="playlist-container">

        <ul class="playlist">

            <li onclick="playSelectedSong(0)">
                Cheppave Chirugali - Udit Narayan
            </li>

            <li onclick="playSelectedSong(1)">
                Ararey Manasaa - Sid Sriram
            </li>

            <li onclick="playSelectedSong(2)">
                Tum Hi Ho - Arijit Singh
            </li>

        </ul>

    </div>

</div>

    <script src="script.js"></script>

</body>
</html>
